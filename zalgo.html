<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sever — zalgo</title>
  <style>
:root {
  --bg: #0a0a0a;
  --fg: #c8c8c8;
  --dim: #555;
  --accent: #e8e8e8;
  --border: #333;
  --link: #999;
  --hover: #fff;
  --code-bg: #111;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--link); text-decoration: none; }
a:hover { color: var(--hover); }

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* ── header ── */

header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.5rem;
  margin-bottom: 2rem;
}

header h1 {
  font-size: 14px;
  font-weight: normal;
  color: var(--dim);
  letter-spacing: 0.1em;
}

header h1 span { color: var(--accent); }

nav {
  margin-top: 0.5rem;
}

nav a {
  margin-right: 1.5rem;
  color: var(--dim);
  font-size: 13px;
}

nav a:hover, nav a.active { color: var(--accent); }

/* ── pieces ── */

.piece {
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2rem;
}

.piece:last-child { border-bottom: none; }

.piece-title {
  font-size: 14px;
  font-weight: normal;
  color: var(--accent);
  margin-bottom: 0.25rem;
}

.piece-date {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 1rem;
}

.piece-pair {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 1rem;
  align-items: start;
}

.piece-pair.ascii-only {
  grid-template-columns: 1fr;
  max-width: 600px;
}

.ascii-art {
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 1rem;
  overflow-x: auto;
  font-size: 10px;
  line-height: 1.15;
  color: var(--fg);
  white-space: pre;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

.painted-col {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.painted-img {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border: 1px solid var(--border);
  display: block;
}

.piece-meta {
  font-size: 12px;
  color: var(--dim);
  margin-top: 0.75rem;
}

/* ── paintings page ── */

.painting-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 1.5rem;
}

.painting-card {
  border: 1px solid var(--border);
  overflow: hidden;
}

.painting-card img {
  width: 100%;
  display: block;
}

.painting-card .card-info {
  padding: 0.75rem;
  font-size: 12px;
}

.painting-card .card-title {
  color: var(--accent);
  margin-bottom: 0.25rem;
}

.painting-card .card-date {
  color: var(--dim);
}

/* ── journal ── */

.journal-entry {
  margin-bottom: 2.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2rem;
}

.journal-entry:last-child { border-bottom: none; }

.journal-date {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 0.75rem;
  letter-spacing: 0.05em;
}

.journal-body {
  font-size: 13px;
  line-height: 1.7;
  color: var(--fg);
  max-width: 65ch;
}

.journal-body p { margin-bottom: 0.75rem; }

/* ── text pages ── */

.text-block {
  color: var(--fg);
  font-size: 13px;
  line-height: 1.7;
  max-width: 65ch;
}

.text-block p { margin-bottom: 1rem; }

.section-title {
  font-size: 13px;
  color: var(--dim);
  margin-bottom: 1.5rem;
  letter-spacing: 0.1em;
}

/* ── footer ── */

footer {
  border-top: 1px solid var(--border);
  margin-top: 3rem;
  padding-top: 1rem;
  font-size: 11px;
  color: var(--dim);
}

/* ── responsive ── */

@media (max-width: 700px) {
  .container { padding: 1rem; }
  .piece-pair { grid-template-columns: 1fr; }
  .ascii-art { font-size: 7px; padding: 0.5rem; }
  .painting-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>// <span>sever</span></h1>
    <nav>
      <a href="/">ascii</a>
      <a href="/paintings.html">paintings</a>
      <a href="/zalgo.html" class="active">zalgo</a>
      <a href="/journal.html">journal</a>
      <a href="/about.html">about</a>
      <a href="/manifesto.html">manifesto</a>
    </nav>
  </header>
  <main>
    <div class="section-title">// zalgo</div>
    <div id="dynamic-gallery" class="painting-grid" data-category="zalgo">
      <p class="text-block">no zalgo yet. sever collects phrases and renders them as corrupted text art.</p>
    </div>

  </main>
  <footer>
    <p>sever — ascii art + painted chaos</p>
  </footer>
</div>
<script>
(async function() {
  const MANIFEST = 'https://pub-5bf11ff70216425b8ac66c4babda16d1.r2.dev/manifest.json';
  const grid = document.getElementById('dynamic-gallery');
  if (!grid) return;
  const category = grid.dataset.category || 'paintings';

  try {
    const res = await fetch(MANIFEST);
    if (!res.ok) throw new Error('no manifest');
    const data = await res.json();
    const items = data[category] || [];

    if (items.length === 0) return; // keep static content

    grid.innerHTML = items.map(item => {
      const title = item.title || item.phrase || '';
      const date = (item.date || '').slice(0, 10);
      const extra = item.intensity ? ' (' + item.intensity + ')' : '';
      return '<div class="painting-card">' +
        '<img src="' + item.url + '" alt="' + title.replace(/"/g, '') + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'">' +
        '<div class="card-info">' +
        '<div class="card-title">' + title.toLowerCase() + extra + '</div>' +
        '<div class="card-date">' + date + '</div>' +
        '</div></div>';
    }).join('');
  } catch (e) {
    // Keep static content if manifest unavailable
  }
})();
</script>
</body>
</html>
